# =============================================================================
# Scenario 6 : Missing / Unavailable Secret
# -----------------------------------------------------------------------------
# WHAT IS BROKEN
#   The pod mounts a volume backed by a Secret named 'mypasswd', but that
#   Secret has NOT been created in the namespace. The kubelet cannot
#   materialise the volume, so the container never starts.
#
# EXPECTED SYMPTOM
#   Pod status  : ContainerCreating (stays there)
#   Events      : "secret \"mypasswd\" not found"
#
# HOW TO DIAGNOSE
#   kubectl get pods
#   kubectl describe pod secret             # Events section is the giveaway
#   kubectl get secret
#
# HOW TO FIX
#   Create the Secret the pod expects, for example:
#     kubectl create secret generic mypasswd --from-literal=password=Passw0rd
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: secret
spec:
  containers:
    - name: main
      image: ubuntu
      command: ["/bin/bash", "-c", "while true; do echo 'still alive'; sleep 10; done"]
      volumeMounts:
        - name: appsecret
          mountPath: "/tmp/config"
  volumes:
    - name: appsecret
      secret:
        # ⚠️  Intentionally references a Secret that does not exist.
        secretName: mypasswd
