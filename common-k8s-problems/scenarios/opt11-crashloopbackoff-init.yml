# =============================================================================
# Scenario 11 : CrashLoopBackOff — Init container fails
# -----------------------------------------------------------------------------
# WHAT IS BROKEN
#   The init container runs 'exit 1'. Init containers must succeed (exit 0)
#   before the main container is allowed to start, so the pod is stuck in
#   'Init:CrashLoopBackOff' and the main container never runs.
#
# EXPECTED SYMPTOM
#   Pod status  : Init:CrashLoopBackOff  (0/1 Init:Error, restarts increasing)
#
# HOW TO DIAGNOSE
#   kubectl get pods
#   kubectl describe pod initpod
#   kubectl logs initpod -c init            # logs of the init container only
#
# HOW TO FIX
#   Make the init container succeed. Replace the command with something that
#   exits 0, e.g.:  command: ["/bin/bash", "-c", "echo ready && exit 0"]
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: initpod
spec:
  initContainers:
    - name: init
      image: centos
      # ⚠️  Intentionally exits non-zero -> init container fails forever.
      command: ["/bin/bash", "-c", "exit 1"]
  containers:
    - name: main
      image: ubuntu
      command: ["/bin/bash", "-c", "while true; do echo 'main is running'; sleep 10; done"]
